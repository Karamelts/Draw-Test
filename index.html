<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>米式卡池模拟器 · 概率递增 · 金紫统计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
    }
    .card {
      max-width: 750px;
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.8rem;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 215, 140, 0.2);
      padding: 2rem 2.2rem 2.5rem;
      color: #f0e9e1;
    }
    h1 {
      font-weight: 500;
      font-size: 2.3rem;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #f7e3c0, #dbb87c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 8px #00000050);
    }
    .subtitle {
      text-align: center;
      color: #b9af9a;
      margin-bottom: 1.8rem;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      border-bottom: 1px dashed rgba(255, 215, 150, 0.35);
      padding-bottom: 0.8rem;
    }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.8rem;
      background: rgba(10, 12, 20, 0.55);
      border-radius: 2rem;
      padding: 1.4rem 1.8rem;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(230, 200, 140, 0.25);
      align-items: center;
      justify-content: space-between;
    }
    .pity-area {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .pity-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pity-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #c0b39b;
      letter-spacing: 0.1rem;
    }
    .pity-value {
      font-size: 2.1rem;
      font-weight: 600;
      color: #fadf9e;
      line-height: 1.2;
    }
    .count-badges {
      display: flex;
      gap: 1.2rem;
      background: #211d16;
      padding: 0.5rem 1.4rem;
      border-radius: 2.5rem;
      border: 1px solid #b49450;
      align-items: center;
    }
    .badge-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 600;
    }
    .gold-badge {
      color: #f7b32b;
      font-size: 1.1rem;
    }
    .purple-badge {
      color: #c9a0dc;
      font-size: 1.1rem;
    }
    .blue-badge {
      color: #9aa9c0;
      font-size: 1rem;
    }
    .rate-box {
      background: #2f2a1f;
      padding: 0.5rem 1.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.1rem;
      color: #ffd966;
      border: 1px solid #b49450;
      box-shadow: 0 0 12px #00000033;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      justify-content: center;
      margin: 1.5rem 0 1.8rem;
    }
    .btn {
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 180, 100, 0.5);
      padding: 0.8rem 1.7rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      color: #f5e3c4;
      cursor: pointer;
      transition: all 0.25s;
      background: linear-gradient(135deg, #2e2a24, #1f1b16);
      box-shadow: 0 6px 14px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:hover {
      border-color: #f3cd81;
      color: #fff3db;
      background: linear-gradient(135deg, #3a3326, #282215);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.6);
    }
    .btn.primary {
      background: linear-gradient(135deg, #b68b40, #7a5e2f);
      border-color: #eec77e;
      color: #0a0a0a;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(255,255,200,0.5);
    }
    .btn.primary:hover {
      background: linear-gradient(135deg, #d4a44c, #8f6f3a);
    }
    .history-log {
      background: #0b0d14cc;
      border-radius: 1.8rem;
      padding: 1.2rem 1.5rem;
      backdrop-filter: blur(16px);
      border: 1px solid #5e5137;
      max-height: 280px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #cdc2aa;
      margin-top: 0.5rem;
      box-shadow: inset 0 0 20px #00000050;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0.2rem;
      border-bottom: 1px solid rgba(255, 255, 200, 0.08);
      align-items: center;
    }
    .five-star {
      color: #f7b32b;
      font-weight: bold;
      text-shadow: 0 0 8px #ffbb2e;
    }
    .four-star {
      color: #c9a0dc;
      font-weight: 500;
    }
    .three-star {
      color: #9a9a9a;
    }
    .star-icon {
      margin-right: 0.3rem;
    }
    .algorithm-note {
      margin-top: 1.4rem;
      font-size: 0.8rem;
      color: #a19782;
      text-align: center;
      border-top: 1px dashed #5b5544;
      padding-top: 0.9rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    @media (max-width: 500px) {
      .card {
        padding: 1.5rem 1rem;
      }
      .stats-grid {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✨ 米式卡池</h1>
    <div class="subtitle">概率递增 · 软保底 · 硬保底 · 金紫统计</div>

    <!-- 统计面板：保底、概率、金/紫/蓝数量 -->
    <div class="stats-grid">
      <div class="pity-area">
        <div class="pity-item">
          <span class="pity-label">五星保底</span>
          <span class="pity-value" id="pityCounter">0</span>
          <span style="font-size:0.7rem; color:#ab9f84;">/90</span>
        </div>
        <div class="pity-item">
          <span class="pity-label">下一抽概率</span>
          <span class="pity-value" id="currentRate">0.60%</span>
        </div>
      </div>
      <div class="count-badges">
        <div class="badge-item">
          <span>🟡</span> <span class="gold-badge" id="goldCount">0</span>
        </div>
        <div class="badge-item">
          <span>🟣</span> <span class="purple-badge" id="purpleCount">0</span>
        </div>
        <div class="badge-item">
          <span>🔵</span> <span class="blue-badge" id="blueCount">0</span>
        </div>
        <div class="badge-item" style="margin-left:0.3rem;">
          <span style="color:#ccc;">📦</span> <span style="color:#e6d7b4;" id="totalPullsSmall">0</span>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="button-group">
      <button class="btn" id="pullOneBtn">🔹 单抽</button>
      <button class="btn primary" id="pullTenBtn">🌟 十连抽</button>
      <button class="btn" id="resetBtn">🔄 重置卡池</button>
    </div>

    <!-- 抽卡记录（含星级与抽数） -->
    <div class="history-log" id="historyContainer">
      <div style="text-align: center; color: #5b5b5b;">📜 抽卡记录将显示在这里</div>
    </div>
    
    <div class="algorithm-note">
      <span>⭐ 基础0.6% · 73抽后每抽+6% · 90硬保底</span>
      <span>🟡 五星 🟣 四星 🔵 三星</span>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 米式卡池核心算法配置 ----------
      const BASE_RATE = 0.006;            // 0.6%
      const SOFT_PITY_START = 73;        // 第74抽开始提升 (计数73表示已73抽未出)
      const HARD_PITY = 90;              
      const RATE_INCREMENT = 0.06;       // 每次+6%

      // 四星概率 (非五星时，约13%为四星，否则三星)
      const FOUR_STAR_PROB = 0.13;

      // ---------- 状态变量 ----------
      let pityCounter = 0;               // 距上次五星的抽数
      let totalPulls = 0;               // 总抽数
      
      // 星级统计
      let countFiveStar = 0;
      let countFourStar = 0;
      let countThreeStar = 0;
      
      let historyLogs = [];             // 记录数组

      // DOM 元素
      const pityCounterEl = document.getElementById('pityCounter');
      const currentRateEl = document.getElementById('currentRate');
      const goldCountEl = document.getElementById('goldCount');
      const purpleCountEl = document.getElementById('purpleCount');
      const blueCountEl = document.getElementById('blueCount');
      const totalPullsSmallEl = document.getElementById('totalPullsSmall');
      const historyContainer = document.getElementById('historyContainer');
      const pullOneBtn = document.getElementById('pullOneBtn');
      const pullTenBtn = document.getElementById('pullTenBtn');
      const resetBtn = document.getElementById('resetBtn');

      // ---------- 工具函数 ----------
      function formatRate(rate) {
        return (rate * 100).toFixed(2) + '%';
      }

      // 获取当前五星概率 (基于pityCounter)
      function getCurrentFiveStarRate(currentPity) {
        if (currentPity >= HARD_PITY) {
          return 1.0;
        }
        if (currentPity >= SOFT_PITY_START) {
          const pullNumber = currentPity + 1; 
          const increments = pullNumber - SOFT_PITY_START;
          let adjustedRate = BASE_RATE + increments * RATE_INCREMENT;
          return Math.min(adjustedRate, 1.0);
        }
        return BASE_RATE;
      }

      // 执行一次抽卡，返回详细结果
      function performSinglePull() {
        const pityBefore = pityCounter;
        const fiveStarRate = getCurrentFiveStarRate(pityBefore);
        const rand = Math.random();
        const isFiveStar = rand < fiveStarRate;

        // 确定星级
        let stars;
        if (isFiveStar) {
          stars = 5;
          pityCounter = 0;            // 抽出五星重置保底
        } else {
          // 非五星：判定四星还是三星
          const fourStarRand = Math.random();
          if (fourStarRand < FOUR_STAR_PROB) {
            stars = 4;
          } else {
            stars = 3;
          }
          pityCounter = Math.min(pityCounter + 1, HARD_PITY);
        }

        // 更新统计计数
        if (stars === 5) countFiveStar++;
        else if (stars === 4) countFourStar++;
        else countThreeStar++;
        
        totalPulls++;

        return {
          stars: stars,
          isFiveStar: isFiveStar,
          rateAtPull: fiveStarRate,
          pityBeforePull: pityBefore,
        };
      }

      // 生成星级文本与样式类
      function getStarDisplay(stars) {
        if (stars === 5) return { text: '★★★★★', class: 'five-star', icon: '🟡' };
        if (stars === 4) return { text: '★★★★', class: 'four-star', icon: '🟣' };
        return { text: '★★★', class: 'three-star', icon: '🔵' };
      }

      // 添加历史记录
      function addHistoryLog(stars, pityBefore, rateAtPull) {
        const display = getStarDisplay(stars);
        const pullNumber = pityBefore + 1;
        const entryText = `第${pullNumber}抽  ${display.icon} ${display.text}  (概率${formatRate(rateAtPull)})`;
        
        historyLogs.unshift({
          text: entryText,
          class: display.class,
          stars: stars,
        });
        
        if (historyLogs.length > 70) {
          historyLogs.pop();
        }
      }

      // 渲染历史记录
      function renderHistory() {
        if (historyLogs.length === 0) {
          historyContainer.innerHTML = '<div style="text-align: center; color: #5b5b5b;">📜 抽卡记录将显示在这里</div>';
          return;
        }
        let html = '';
        historyLogs.forEach(log => {
          html += `<div class="log-entry"><span class="${log.class}">${log.text}</span></div>`;
        });
        historyContainer.innerHTML = html;
        historyContainer.scrollTop = 0;
      }

      // 更新所有UI数据
      function updateUI() {
        // 保底与概率
        pityCounterEl.textContent = pityCounter;
        const nextRate = getCurrentFiveStarRate(pityCounter);
        currentRateEl.textContent = formatRate(nextRate);
        
        // 星级统计
        goldCountEl.textContent = countFiveStar;
        purpleCountEl.textContent = countFourStar;
        blueCountEl.textContent = countThreeStar;
        totalPullsSmallEl.textContent = totalPulls;
        
        // 保底颜色提醒
        if (pityCounter >= 80) {
          pityCounterEl.style.color = '#ff8c6b';
        } else if (pityCounter >= SOFT_PITY_START) {
          pityCounterEl.style.color = '#f5b042';
        } else {
          pityCounterEl.style.color = '#fadf9e';
        }
      }

      // 单抽处理
      function executeSinglePull() {
        const result = performSinglePull();
        addHistoryLog(result.stars, result.pityBeforePull, result.rateAtPull);
        updateUI();
        renderHistory();
      }

      // 十连抽处理
      function executeTenPull() {
        for (let i = 0; i < 10; i++) {
          const result = performSinglePull();
          addHistoryLog(result.stars, result.pityBeforePull, result.rateAtPull);
        }
        updateUI();
        renderHistory();
      }

      // 重置所有状态
      function resetGacha() {
        pityCounter = 0;
        totalPulls = 0;
        countFiveStar = 0;
        countFourStar = 0;
        countThreeStar = 0;
        historyLogs = [];
        updateUI();
        renderHistory();
      }

      // ---------- 事件绑定 ----------
      pullOneBtn.addEventListener('click', executeSinglePull);
      pullTenBtn.addEventListener('click', executeTenPull);
      resetBtn.addEventListener('click', resetGacha);

      // 键盘快捷键
      window.addEventListener('keydown', (e) => {
        if (e.key === '1' || e.key === '!') {
          e.preventDefault();
          executeSinglePull();
        } else if (e.key === '0' || e.key === ')') {
          e.preventDefault();
          executeTenPull();
        } else if (e.key === 'r' || e.key === 'R') {
          e.preventDefault();
          resetGacha();
        }
      });

      // 初始化
      updateUI();
      renderHistory();
      console.log('🎰 米式卡池模拟器 (含金/紫统计) 已启动');
    })();
  </script>
</body>
</html>
