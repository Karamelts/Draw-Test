<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>米式卡池 · 大小保底 · 限定统计</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
    }
    .card {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.8rem;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 215, 140, 0.2);
      padding: 1.8rem 2rem 2.2rem;
      color: #f0e9e1;
    }
    h1 {
      font-weight: 500;
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #f7e3c0, #dbb87c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      text-align: center;
      color: #b9af9a;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      font-weight: 300;
      border-bottom: 1px dashed rgba(255, 215, 150, 0.35);
      padding-bottom: 0.7rem;
    }

    /* ===== 第一排：保底信息 ===== */
    .pity-row {
      background: rgba(10, 12, 20, 0.55);
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(230, 200, 140, 0.25);
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 0.8rem;
    }
    .pity-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pity-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #c0b39b;
      letter-spacing: 0.08rem;
      white-space: nowrap;
    }
    .pity-value {
      font-size: 2rem;
      font-weight: 600;
      color: #fadf9e;
      line-height: 1.2;
      text-align: center;
    }

    /* ===== 第二排：统计徽章 ===== */
    .badge-row {
      background: rgba(10, 12, 20, 0.55);
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(230, 200, 140, 0.25);
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.2rem;
    }
    .badge-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
      font-size: 1rem;
      min-width: 70px;
      justify-content: center;
    }
    .badge-item .emoji {
      font-size: 1.2rem;
    }
    .badge-item .count {
      min-width: 35px;
      text-align: center;
      display: inline-block;
    }
    .gold-badge { color: #f7b32b; }
    .purple-badge { color: #c9a0dc; }
    .blue-badge { color: #9aa9c0; }

    /* 高级统计 */
    .advanced-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      background: rgba(0,0,0,0.3);
      border-radius: 1.5rem;
      padding: 0.8rem 1.5rem;
      margin: 0 0 1.2rem 0;
      justify-content: center;
      color: #d4c099;
      font-size: 0.9rem;
    }
    .advanced-stats strong {
      min-width: 40px;
      display: inline-block;
      text-align: right;
    }

    /* 按钮 */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin: 1.2rem 0 1.5rem;
    }
    .btn {
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 180, 100, 0.5);
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #f5e3c4;
      cursor: pointer;
      transition: all 0.25s;
      background: linear-gradient(135deg, #2e2a24, #1f1b16);
      box-shadow: 0 6px 14px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:hover {
      border-color: #f3cd81;
      color: #fff3db;
      background: linear-gradient(135deg, #3a3326, #282215);
      transform: translateY(-2px);
    }
    .btn.primary {
      background: linear-gradient(135deg, #b68b40, #7a5e2f);
      border-color: #eec77e;
      color: #0a0a0a;
      font-weight: 700;
    }

    /* 历史记录 */
    .history-log {
      background: #0b0d14cc;
      border-radius: 1.8rem;
      padding: 1rem 1.4rem;
      backdrop-filter: blur(16px);
      border: 1px solid #5e5137;
      max-height: 250px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #cdc2aa;
      box-shadow: inset 0 0 20px #00000050;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0.2rem;
      border-bottom: 1px solid rgba(255, 255, 200, 0.08);
    }
    .five-star { color: #f7b32b; font-weight: bold; }
    .four-star { color: #c9a0dc; }
    .three-star { color: #9a9a9a; }
    .limited-tag { color: #ff8c6b; font-size:0.7rem; margin-left:0.3rem;}
    .standard-tag { color: #a0c0f0; font-size:0.7rem; margin-left:0.3rem;}

    .algorithm-note {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #a19782;
      text-align: center;
      border-top: 1px dashed #5b5544;
      padding-top: 0.8rem;
    }

    @media (max-width: 500px) {
      .pity-row { gap: 1.2rem; }
      .badge-row { gap: 1rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✨ 米式卡池 · 限定</h1>
    <div class="subtitle">大小保底 · 限定/常驻 · 实时期望统计</div>

    <!-- 第一排：保底信息 -->
    <div class="pity-row">
      <div class="pity-item">
        <span class="pity-label">五星保底</span>
        <span class="pity-value" id="pityCounter">0</span>
        <span style="font-size:0.7rem; color:#ab9f84;">/90</span>
      </div>
      <div class="pity-item">
        <span class="pity-label">下一抽概率</span>
        <span class="pity-value" id="currentRate">0.60%</span>
      </div>
      <div class="pity-item">
        <span class="pity-label">保底状态</span>
        <span class="pity-value" id="guaranteeStatus" style="font-size:1.3rem;">小保底</span>
      </div>
    </div>

    <!-- 第二排：统计徽章 -->
    <div class="badge-row">
      <div class="badge-item">
        <span class="emoji">🟡</span>
        <span class="count gold-badge" id="goldCount">0</span>
      </div>
      <div class="badge-item">
        <span class="emoji">🟣</span>
        <span class="count purple-badge" id="purpleCount">0</span>
      </div>
      <div class="badge-item">
        <span class="emoji">🔵</span>
        <span class="count blue-badge" id="blueCount">0</span>
      </div>
      <div class="badge-item">
        <span class="emoji">⭐</span>
        <span class="count" style="color:#ffb347;" id="limitedCount">0</span>
      </div>
      <div class="badge-item">
        <span class="emoji">📦</span>
        <span class="count" style="color:#e6d7b4;" id="totalPullsSmall">0</span>
      </div>
    </div>

    <!-- 期望统计 -->
    <div class="advanced-stats">
      <span>🎯 不歪率: <strong id="winRateDisplay">0%</strong></span>
      <span>⭐ 平均出金抽数: <strong id="avgFiveStarPulls">0</strong></span>
      <span>🌟 平均限定抽数: <strong id="avgLimitedPulls">0</strong></span>
    </div>

    <!-- 按钮 -->
    <div class="button-group">
      <button class="btn" id="pullOneBtn">🔹 单抽</button>
      <button class="btn primary" id="pullTenBtn">🌟 十连抽</button>
      <button class="btn" id="resetBtn">🔄 重置</button>
    </div>

    <!-- 历史记录 -->
    <div class="history-log" id="historyContainer">
      <div style="text-align: center; color: #5b5b5b;">📜 抽卡记录</div>
    </div>
    
    <div class="algorithm-note">
      ⭐ 0.6%基础 · 73软保底 · 90硬保底 · 50%限定/常驻 · 歪后大保底
    </div>
  </div>

  <script>
    (function() {
      const BASE_RATE = 0.006;
      const SOFT_PITY_START = 73;
      const HARD_PITY = 90;
      const RATE_INCREMENT = 0.06;
      const FOUR_STAR_PROB = 0.13;
      const LIMITED_PROB = 0.5;

      let pityCounter = 0;
      let totalPulls = 0;
      let countFiveStar = 0;
      let countFourStar = 0;
      let countThreeStar = 0;
      let countLimited = 0;
      let isGuaranteedLimited = false;
      
      let fiveStarPullRecords = [];
      let limitedPullRecords = [];
      let lastLimitedTotalPulls = 0;
      let winCount = 0;
      let loseCount = 0;
      let historyLogs = [];

      const pityCounterEl = document.getElementById('pityCounter');
      const currentRateEl = document.getElementById('currentRate');
      const guaranteeStatusEl = document.getElementById('guaranteeStatus');
      const goldCountEl = document.getElementById('goldCount');
      const purpleCountEl = document.getElementById('purpleCount');
      const blueCountEl = document.getElementById('blueCount');
      const limitedCountEl = document.getElementById('limitedCount');
      const totalPullsSmallEl = document.getElementById('totalPullsSmall');
      const winRateDisplayEl = document.getElementById('winRateDisplay');
      const avgFiveStarPullsEl = document.getElementById('avgFiveStarPulls');
      const avgLimitedPullsEl = document.getElementById('avgLimitedPulls');
      const historyContainer = document.getElementById('historyContainer');

      function formatRate(r) { return (r*100).toFixed(2)+'%'; }
      
      function getCurrentFiveStarRate(pity) {
        if (pity >= HARD_PITY) return 1.0;
        if (pity >= SOFT_PITY_START) {
          const pullNum = pity + 1;
          const inc = pullNum - SOFT_PITY_START;
          return Math.min(BASE_RATE + inc * RATE_INCREMENT, 1.0);
        }
        return BASE_RATE;
      }

      function performSinglePull() {
        const pityBefore = pityCounter;
        const fiveStarRate = getCurrentFiveStarRate(pityBefore);
        const rand = Math.random();
        const isFiveStar = rand < fiveStarRate;
        let stars, isLimited = false, isStandard = false;

        if (isFiveStar) {
          stars = 5;
          fiveStarPullRecords.push(pityBefore + 1);
          
          if (isGuaranteedLimited) {
            isLimited = true;
            isGuaranteedLimited = false;
          } else {
            if (Math.random() < LIMITED_PROB) {
              isLimited = true;
            } else {
              isStandard = true;
              isGuaranteedLimited = true;
            }
          }

          if (isLimited) {
            countLimited++;
            winCount++;
            const pullsSinceLastLimited = totalPulls - lastLimitedTotalPulls + 1;
            limitedPullRecords.push(pullsSinceLastLimited);
            lastLimitedTotalPulls = totalPulls + 1;
          } else if (isStandard) {
            loseCount++;
          }

          pityCounter = 0;
        } else {
          const fourRand = Math.random();
          stars = fourRand < FOUR_STAR_PROB ? 4 : 3;
          pityCounter = Math.min(pityCounter + 1, HARD_PITY);
        }

        if (stars === 5) countFiveStar++;
        else if (stars === 4) countFourStar++;
        else countThreeStar++;
        
        totalPulls++;

        return {
          stars, isFiveStar, isLimited, isStandard,
          rateAtPull: fiveStarRate, pityBeforePull: pityBefore
        };
      }

      function getStarDisplay(stars, isLimited, isStandard) {
        if (stars === 5) {
          if (isLimited) return { text: '★★★★★', class: 'five-star', tag: '限定', tagClass: 'limited-tag' };
          if (isStandard) return { text: '★★★★★', class: 'five-star', tag: '常驻', tagClass: 'standard-tag' };
          return { text: '★★★★★', class: 'five-star', tag: '', tagClass: '' };
        }
        if (stars === 4) return { text: '★★★★', class: 'four-star', tag: '', tagClass: '' };
        return { text: '★★★', class: 'three-star', tag: '', tagClass: '' };
      }

      function addHistoryLog(stars, pityBefore, rateAtPull, isLimited, isStandard) {
        const disp = getStarDisplay(stars, isLimited, isStandard);
        const pullNum = pityBefore + 1;
        let entry = `第${pullNum}抽 ${disp.text}`;
        if (disp.tag) entry += ` <span class="${disp.tagClass}">${disp.tag}</span>`;
        entry += ` (${formatRate(rateAtPull)})`;
        historyLogs.unshift({ text: entry, class: disp.class });
        if (historyLogs.length > 60) historyLogs.pop();
      }

      function renderHistory() {
        if (!historyLogs.length) {
          historyContainer.innerHTML = '<div style="text-align:center;color:#5b5b5b;">📜 抽卡记录</div>';
          return;
        }
        let html = '';
        historyLogs.forEach(l => html += `<div class="log-entry"><span class="${l.class}">${l.text}</span></div>`);
        historyContainer.innerHTML = html;
        historyContainer.scrollTop = 0;
      }

      function updateUI() {
        pityCounterEl.textContent = pityCounter;
        const nextRate = getCurrentFiveStarRate(pityCounter);
        currentRateEl.textContent = formatRate(nextRate);
        
        if (isGuaranteedLimited) {
          guaranteeStatusEl.textContent = '大保底';
          guaranteeStatusEl.style.color = '#ff8c6b';
        } else {
          guaranteeStatusEl.textContent = '小保底';
          guaranteeStatusEl.style.color = '#a0c0f0';
        }
        
        goldCountEl.textContent = countFiveStar;
        purpleCountEl.textContent = countFourStar;
        blueCountEl.textContent = countThreeStar;
        limitedCountEl.textContent = countLimited;
        totalPullsSmallEl.textContent = totalPulls;

        const totalFiveStars = winCount + loseCount;
        const winRate = totalFiveStars > 0 ? ((winCount / totalFiveStars) * 100).toFixed(1) : 0;
        winRateDisplayEl.textContent = winRate + '%';

        const avgFive = fiveStarPullRecords.length > 0 
          ? (fiveStarPullRecords.reduce((a,b)=>a+b,0) / fiveStarPullRecords.length).toFixed(1) 
          : '0';
        avgFiveStarPullsEl.textContent = avgFive;

        const avgLimited = limitedPullRecords.length > 0 
          ? (limitedPullRecords.reduce((a,b)=>a+b,0) / limitedPullRecords.length).toFixed(1) 
          : '0';
        avgLimitedPullsEl.textContent = avgLimited;

        if (pityCounter >= 80) pityCounterEl.style.color = '#ff8c6b';
        else if (pityCounter >= SOFT_PITY_START) pityCounterEl.style.color = '#f5b042';
        else pityCounterEl.style.color = '#fadf9e';
      }

      function executeSinglePull() {
        const res = performSinglePull();
        addHistoryLog(res.stars, res.pityBeforePull, res.rateAtPull, res.isLimited, res.isStandard);
        updateUI();
        renderHistory();
      }

      function executeTenPull() {
        for (let i=0; i<10; i++) {
          const res = performSinglePull();
          addHistoryLog(res.stars, res.pityBeforePull, res.rateAtPull, res.isLimited, res.isStandard);
        }
        updateUI();
        renderHistory();
      }

      function resetAll() {
        pityCounter = 0;
        totalPulls = 0;
        countFiveStar = 0;
        countFourStar = 0;
        countThreeStar = 0;
        countLimited = 0;
        isGuaranteedLimited = false;
        fiveStarPullRecords = [];
        limitedPullRecords = [];
        lastLimitedTotalPulls = 0;
        winCount = 0;
        loseCount = 0;
        historyLogs = [];
        updateUI();
        renderHistory();
      }

      document.getElementById('pullOneBtn').addEventListener('click', executeSinglePull);
      document.getElementById('pullTenBtn').addEventListener('click', executeTenPull);
      document.getElementById('resetBtn').addEventListener('click', resetAll);

      window.addEventListener('keydown', (e) => {
        if (e.key === '1') { e.preventDefault(); executeSinglePull(); }
        else if (e.key === '0') { e.preventDefault(); executeTenPull(); }
        else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetAll(); }
      });

      updateUI();
      renderHistory();
    })();
  </script>
</body>
</html>
