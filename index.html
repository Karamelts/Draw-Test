<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>米式卡池模拟器 · 概率递增机制</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 2rem 2rem 2.5rem;
      color: #f0e9e1;
      transition: all 0.2s ease;
    }
    h1 {
      font-weight: 500;
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #f7e3c0, #dbb87c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 6px #00000040);
    }
    .subtitle {
      text-align: center;
      color: #b9af9a;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      border-bottom: 1px dashed rgba(255, 215, 150, 0.3);
      padding-bottom: 0.8rem;
    }
    .stats-panel {
      background: rgba(10, 12, 20, 0.55);
      border-radius: 2rem;
      padding: 1.4rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(230, 200, 140, 0.2);
    }
    .pity-box {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .pity-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pity-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #c0b39b;
      letter-spacing: 0.1rem;
    }
    .pity-value {
      font-size: 2.2rem;
      font-weight: 600;
      color: #fadf9e;
      line-height: 1.2;
    }
    .rate-display {
      background: #2f2a1f;
      padding: 0.6rem 1.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.1rem;
      color: #ffd966;
      border: 1px solid #b49450;
      box-shadow: 0 0 12px #00000033;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      justify-content: center;
      margin: 1.8rem 0 1.5rem;
    }
    .btn {
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 180, 100, 0.5);
      padding: 0.8rem 1.7rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      color: #f5e3c4;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.03rem;
      background: linear-gradient(135deg, #2e2a24, #1f1b16);
      box-shadow: 0 6px 14px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:hover {
      border-color: #f3cd81;
      color: #fff3db;
      background: linear-gradient(135deg, #3a3326, #282215);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.6);
    }
    .btn.primary {
      background: linear-gradient(135deg, #b68b40, #7a5e2f);
      border-color: #eec77e;
      color: #0a0a0a;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(255,255,200,0.5);
    }
    .btn.primary:hover {
      background: linear-gradient(135deg, #d4a44c, #8f6f3a);
    }
    .history-log {
      background: #0b0d14cc;
      border-radius: 1.8rem;
      padding: 1.2rem 1.5rem;
      backdrop-filter: blur(16px);
      border: 1px solid #5e5137;
      max-height: 260px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #cdc2aa;
      margin-top: 1rem;
      box-shadow: inset 0 0 20px #00000050;
    }
    .log-entry {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0.2rem;
      border-bottom: 1px solid rgba(255, 255, 200, 0.08);
    }
    .five-star {
      color: #f7b32b;
      font-weight: bold;
      text-shadow: 0 0 8px #ffbb2e;
    }
    .four-star {
      color: #c9a0dc;
      font-weight: 500;
    }
    .three-star {
      color: #9a9a9a;
    }
    .badge {
      background: #2a2419;
      border-radius: 20px;
      padding: 0.2rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .algorithm-note {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: #a19782;
      text-align: center;
      border-top: 1px dashed #5b5544;
      padding-top: 0.9rem;
    }
    button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    @media (max-width: 500px) {
      .card {
        padding: 1.5rem 1.2rem;
      }
      .pity-box {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✨ 米式卡池</h1>
    <div class="subtitle">概率递增 · 软保底 · 硬保底模拟</div>

    <!-- 状态面板 -->
    <div class="stats-panel">
      <div class="pity-box">
        <div class="pity-item">
          <span class="pity-label">五星保底</span>
          <span class="pity-value" id="pityCounter">0</span>
          <span style="font-size:0.7rem; color:#ab9f84;">/90</span>
        </div>
        <div class="pity-item">
          <span class="pity-label">当前概率</span>
          <span class="pity-value" id="currentRate">0.60%</span>
        </div>
      </div>
      <div class="rate-display" id="totalPullsDisplay">
        🎲 总抽: 0
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="button-group">
      <button class="btn" id="pullOneBtn">🔹 单抽</button>
      <button class="btn primary" id="pullTenBtn">🌟 十连抽</button>
      <button class="btn" id="resetBtn">🔄 重置卡池</button>
    </div>

    <!-- 抽卡记录 -->
    <div class="history-log" id="historyContainer">
      <div style="text-align: center; color: #5b5b5b;">📜 抽卡记录将显示在这里</div>
    </div>
    
    <div class="algorithm-note">
      ⚙️ 基础概率0.6% · 73抽后每抽+6%概率 · 90抽硬保底 · 抽到五星重置
    </div>
  </div>

  <script>
    (function() {
      // ---------- 米式卡池核心算法配置 ----------
      const BASE_RATE = 0.006;            // 基础五星概率 0.6%
      const SOFT_PITY_START = 73;        // 软保底起始抽数 (第74抽开始提升概率，即计数=73时触发)
      const HARD_PITY = 90;              // 硬保底抽数 (第90抽必定五星)
      const RATE_INCREMENT = 0.06;       // 每次增加6% (0.06)

      // ---------- 状态变量 ----------
      let pityCounter = 0;               // 自上次五星后累计抽数 (0 ~ 90)
      let totalPulls = 0;               // 历史总抽数 (仅展示)
      let historyLogs = [];             // 存储最近抽卡记录 (最多保存60条)

      // DOM 元素
      const pityCounterEl = document.getElementById('pityCounter');
      const currentRateEl = document.getElementById('currentRate');
      const totalPullsDisplayEl = document.getElementById('totalPullsDisplay');
      const historyContainer = document.getElementById('historyContainer');
      const pullOneBtn = document.getElementById('pullOneBtn');
      const pullTenBtn = document.getElementById('pullTenBtn');
      const resetBtn = document.getElementById('resetBtn');

      // ---------- 工具函数 ----------
      function formatRate(rate) {
        return (rate * 100).toFixed(2) + '%';
      }

      // 根据当前保底计数计算实际五星概率
      function getCurrentFiveStarRate(currentPity) {
        if (currentPity >= HARD_PITY) {
          return 1.0; // 硬保底，100%
        }
        if (currentPity >= SOFT_PITY_START) {
          // 软保底区间：从第74抽开始 (pityCounter=73表示已抽73次未出，即将第74抽)
          // 第74抽时 pityCounter = 73, 增加次数 = (73 - 73 + 1) = 1 ? 我们按官方常见逻辑：
          // 从第74抽开始，概率 = 0.6% + (当前抽数 - 73) * 6%
          // 当前抽数 = pityCounter + 1 (因为本次是第pityCounter+1抽)
          const pullNumber = currentPity + 1; 
          const increments = pullNumber - SOFT_PITY_START; // 74抽时 increments=1, 75抽=2 ...
          let adjustedRate = BASE_RATE + increments * RATE_INCREMENT;
          return Math.min(adjustedRate, 1.0); // 不超过100%
        }
        return BASE_RATE;
      }

      // 执行一次抽卡，返回是否抽出五星 (true/false)
      function performSinglePull() {
        const currentPity = pityCounter;
        const rate = getCurrentFiveStarRate(currentPity);
        const rand = Math.random();
        const isFiveStar = rand < rate;

        // 更新保底计数器
        if (isFiveStar) {
          pityCounter = 0;   // 抽出五星重置
        } else {
          pityCounter = Math.min(pityCounter + 1, HARD_PITY);
        }
        
        totalPulls += 1;
        
        // 返回本次抽卡结果及当时概率(用于记录)
        return {
          isFiveStar: isFiveStar,
          rateAtPull: rate,
          pityBeforePull: currentPity,
        };
      }

      // 根据结果生成星级展示 (简化：五星/四星/三星，这里聚焦五星机制，其他随机展示)
      function getStarResult(isFiveStar) {
        if (isFiveStar) return { stars: 5, name: '★★★★★' };
        // 非五星时随机分配四星或三星 (模拟普通掉落)
        const randFourStar = Math.random();
        if (randFourStar < 0.13) { // 约13%四星概率，符合一般感觉
          return { stars: 4, name: '★★★★' };
        } else {
          return { stars: 3, name: '★★★' };
        }
      }

      // 添加记录到历史
      function addHistoryLog(starResult, pityBefore, rateAtPull, isFiveStar) {
        const starClass = isFiveStar ? 'five-star' : (starResult.stars === 4 ? 'four-star' : 'three-star');
        const entryText = `第${pityBefore + 1}抽  ${starResult.name}  (概率${formatRate(rateAtPull)})`;
        
        historyLogs.unshift({
          text: entryText,
          class: starClass,
          isFiveStar: isFiveStar,
        });
        
        // 保持最多60条记录
        if (historyLogs.length > 60) {
          historyLogs.pop();
        }
        renderHistory();
      }

      // 渲染历史记录区域
      function renderHistory() {
        if (historyLogs.length === 0) {
          historyContainer.innerHTML = '<div style="text-align: center; color: #5b5b5b;">📜 抽卡记录将显示在这里</div>';
          return;
        }
        let html = '';
        historyLogs.forEach(log => {
          html += `<div class="log-entry"><span class="${log.class}">${log.text}</span></div>`;
        });
        historyContainer.innerHTML = html;
        // 自动滚动到顶部(最新记录在上方)
        historyContainer.scrollTop = 0;
      }

      // 更新UI：概率显示、保底计数、总抽数
      function updateUI() {
        // 显示保底计数
        pityCounterEl.textContent = pityCounter;
        
        // 计算并显示下一抽的概率 (基于当前pityCounter)
        const nextRate = getCurrentFiveStarRate(pityCounter);
        currentRateEl.textContent = formatRate(nextRate);
        
        // 总抽数
        totalPullsDisplayEl.textContent = `🎲 总抽: ${totalPulls}`;
        
        // 根据接近保底的程度微调视觉效果
        if (pityCounter >= 80) {
          pityCounterEl.style.color = '#ff8c6b';
        } else if (pityCounter >= SOFT_PITY_START) {
          pityCounterEl.style.color = '#f5b042';
        } else {
          pityCounterEl.style.color = '#fadf9e';
        }
      }

      // 处理单次抽卡 (内部逻辑，返回五星标志)
      function executeSinglePullAndRecord() {
        const result = performSinglePull();
        const starInfo = getStarResult(result.isFiveStar);
        addHistoryLog(starInfo, result.pityBeforePull, result.rateAtPull, result.isFiveStar);
        updateUI();
        return result.isFiveStar;
      }

      // 执行十连抽 (逐一抽取并记录)
      function executeTenPull() {
        // 为了防止UI频繁刷新，我们可以批量更新后统一渲染
        for (let i = 0; i < 10; i++) {
          const result = performSinglePull();
          const starInfo = getStarResult(result.isFiveStar);
          addHistoryLog(starInfo, result.pityBeforePull, result.rateAtPull, result.isFiveStar);
        }
        updateUI();
      }

      // 重置卡池状态
      function resetGacha() {
        pityCounter = 0;
        totalPulls = 0;
        historyLogs = [];
        updateUI();
        renderHistory();
      }

      // ---------- 事件绑定 ----------
      pullOneBtn.addEventListener('click', () => {
        executeSinglePullAndRecord();
      });

      pullTenBtn.addEventListener('click', () => {
        executeTenPull();
      });

      resetBtn.addEventListener('click', () => {
        resetGacha();
      });

      // 额外：键盘支持 (可选)
      window.addEventListener('keydown', (e) => {
        if (e.key === '1' || e.key === '!') {
          e.preventDefault();
          executeSinglePullAndRecord();
        } else if (e.key === '0' || e.key === ')') {
          e.preventDefault();
          executeTenPull();
        } else if (e.key === 'r' || e.key === 'R') {
          e.preventDefault();
          resetGacha();
        }
      });

      // ---------- 初始化渲染 ----------
      updateUI();
      renderHistory();

      // 附加说明：完全不需要调用任何外部API，纯前端概率模拟。
      console.log('🎰 米式卡池模拟器已启动 | 基础0.6% | 73抽软保底 | 90硬保底');
    })();
  </script>
</body>
</html>
